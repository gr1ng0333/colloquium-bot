<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Билеты к коллоквиуму</title>

    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

    <style>
        /* ===== СБРОС ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===== ТЁМНАЯ ТЕМА ===== */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 17px;
            line-height: 1.7;
            padding: 16px;
            max-width: 100vw;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* ===== ЗАГОЛОВКИ ===== */
        h2 {
            color: #82b1ff;
            font-size: 1.3em;
            margin-bottom: 12px;
            line-height: 1.4;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        h3 {
            color: #b0bec5;
            font-size: 1.1em;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        /* ===== ТЕКСТ ===== */
        p {
            margin-bottom: 12px;
        }

        strong {
            color: #ffffff;
        }

        /* ===== ФОРМУЛЫ ===== */
        .katex { color: #e0e0e0 !important; }

        .katex-block {
            overflow-x: auto;
            overflow-y: hidden;
            padding: 12px 0;
            margin: 8px 0;
            -webkit-overflow-scrolling: touch;
        }

        /* Чтобы блочная формула не вылезала за экран */
        .katex-block .katex-display {
            margin: 0;
            padding: 0;
        }

        .katex-block .katex {
            font-size: 1.05em;
        }

        .katex-inline .katex {
            font-size: 1.0em;
        }

        /* ===== ПЛЕЙСХОЛДЕР ГРАФИКА ===== */
        .image-placeholder {
            background-color: #1e1e2e;
            border: 1px dashed #555;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            color: #888;
            margin: 16px 0;
            font-size: 0.9em;
        }

        /* ===== РАЗДЕЛИТЕЛЬ МЕЖДУ БИЛЕТАМИ ===== */
        .ticket-divider {
            border: none;
            border-top: 2px solid #333;
            margin: 40px 0;
        }

        /* ===== БИЛЕТ ===== */
        .ticket {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

{% for fragment in fragments %}
    {% if not loop.first %}
        <hr class="ticket-divider">
    {% endif %}
    <div class="ticket">
        {{ fragment | safe }}
    </div>
{% endfor %}

    <!-- KaTeX JS -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false}
                ],
                throwOnError: false
            });
        });
    </script>
</body>
</html>
